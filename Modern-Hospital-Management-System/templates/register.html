{% extends 'base.html' %}

{% block title %}Register - Hospital Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-lg mt-5">
            <div class="card-header bg-success text-white text-center py-4">
                <h3><i class="fas fa-user-plus"></i> Create Account</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="name" required>
                                <label>Full Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" name="email" required>
                                <label>Email</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" name="password" required minlength="6">
                        <label>Password</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <select class="form-select" name="role" id="roleSelect" required>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                        <label>Register As</label>
                    </div>
                    
                    <!-- Patient Fields -->
                    <div id="patientFields">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input type="number" class="form-control" name="age" min="1">
                                    <label>Age</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <select class="form-select" name="gender">
                                        <option value="">Select</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                    </select>
                                    <label>Gender</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input type="tel" class="form-control" name="phone">
                                    <label>Phone</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-floating mb-3">
                            <textarea class="form-control" name="address" style="height: 80px"></textarea>
                            <label>Address</label>
                        </div>
                    </div>
                    
                    <!-- Doctor Fields -->
                    <div id="doctorFields" style="display: none;">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" name="specialization">
                                    <label>Specialization</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" name="experience" min="0">
                                    <label>Experience (years)</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="tel" class="form-control" name="phone">
                            <label>Phone</label>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <p class="mb-0">Already have an account? 
                    <a href="{{ url_for('auth.login') }}" class="text-success">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('roleSelect').addEventListener('change', function() {
        const patientFields = document.getElementById('patientFields');
        const doctorFields = document.getElementById('doctorFields');
        
        if (this.value === 'doctor') {
            patientFields.style.display = 'none';
            doctorFields.style.display = 'block';
        } else {
            patientFields.style.display = 'block';
            doctorFields.style.display = 'none';
        }
    });
</script>
{% endblock %}
