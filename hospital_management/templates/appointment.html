{% extends "base.html" %}

{% block title %}Book Appointment{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-calendar-plus"></i> Book Appointment</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5><i class="fas fa-plus-circle"></i> New Appointment</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('appointment') }}">
                    <div class="mb-3">
                        <label for="doctor_id" class="form-label">Select Doctor</label>
                        <select class="form-control" id="doctor_id" name="doctor_id" required>
                            <option value="">Choose a doctor...</option>
                            {% for doctor in doctors %}
                            <option value="{{ doctor[0] }}">
                                {{ doctor[1] }} - {{ doctor[2] }} ({{ doctor[3] }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="appointment_date" class="form-label">Appointment Date</label>
                            <input type="date" class="form-control" id="appointment_date" name="appointment_date" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="appointment_time" class="form-label">Appointment Time</label>
                            <input type="time" class="form-control" id="appointment_time" name="appointment_time" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="symptoms" class="form-label">Symptoms / Reason for Visit</label>
                        <textarea class="form-control" id="symptoms" name="symptoms" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-check"></i> Book Appointment
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h5><i class="fas fa-info-circle"></i> Instructions</h5>
            </div>
            <div class="card-body">
                <ul class="list-unstyled">
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Select your preferred doctor</li>
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Choose a convenient date and time</li>
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Describe your symptoms clearly</li>
                    <li class="mb-2"><i class="fas fa-check text-success"></i> You'll receive confirmation soon</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
// Set minimum date to today
document.getElementById('appointment_date').min = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
